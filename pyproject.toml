[build-system]
requires = [
    "setuptools>=68"
]
build-backend = "setuptools.build_meta"

[project]
name = "j-perm"
version = "1.13.0"
description = "json permutation library"
authors = [
    { name = "Roman", email = "kuschanow@gmail.com" },
]
readme = "README.md"

requires-python = ">=3.10"

license = { text = "MIT" }

dependencies = [
    "jmespath",
    "regex",
    "pyyaml"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--cov=src/j_perm --cov-report=term-missing"
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/j_perm"]
omit = [
    # Generated by langforge (dev-time); not hand-written, excluded from coverage.
    "*/j_perm/text/_generated/*",
    # Grammar source consumed only by scripts/regen_grammar.py, never at runtime.
    "*/j_perm/text/grammar/*",
]

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "^\\s*\\.\\.\\.\\s*$",
]

[project.urls]
Homepage = "https://github.com/kuschanow/j-perm"
Source = "https://github.com/kuschanow/j-perm"
Tracker = "https://github.com/kuschanow/j-perm/issues"
Documentation = "https://github.com/kuschanow/j-perm"

[tool.setuptools.packages.find]
where = ["src"]
